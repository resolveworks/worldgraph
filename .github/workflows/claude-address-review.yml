name: Claude — Address Review

on:
  pull_request_review:
    types: [submitted]

jobs:
  address-review:
    if: |
      github.event.review.state == 'changes_requested' && (
        github.event.review.user.login == 'claude[bot]' ||
        github.event.review.author_association == 'OWNER' ||
        github.event.review.author_association == 'MEMBER' ||
        github.event.review.author_association == 'COLLABORATOR' ||
        github.event.review.author_association == 'CONTRIBUTOR'
      )
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Install pre-commit hooks
        run: uv run pre-commit install

      - name: Address review
        id: address-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-6 --dangerously-skip-permissions"
          prompt: |
            A review on PR #${{ github.event.pull_request.number }} requested changes. Implement the requested fixes.

            Review by ${{ github.event.review.user.login }}:

            ${{ github.event.review.body }}

            Also check for any inline review comments with `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments` and address those too.

            Run `uv run pytest` to verify all tests pass after implementing the fixes. Then commit and push to the PR branch.

            Every change you make should leave the codebase looking like it was always designed this way. No compat shims, no dead code, no half-measures — if something needs to change, change it fully.
