name: Claude — Fix Issue

on:
  issues:
    types: [opened]

jobs:
  fix-issue:
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install pre-commit hooks
        run: uv run pre-commit install

      - name: Fix issue
        id: fix-issue
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Fix the following issue and open a pull request.

            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            Read the relevant code before making changes — do not guess at implementations you haven't seen. If the fix involves matching behavior, write a failing test first that captures the scenario, then make it pass.

            Run `uv run pytest` to verify all tests pass before committing.

            Every change you make should leave the codebase looking like it was always designed this way. No compat shims, no dead code, no half-measures — if something needs to change, change it fully.
          claude_args: "--model claude-opus-4-6 --allowed-tools Bash(gh:*) Bash(uv:*)"
